<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img">
  <title>Wordle</title>
  <!-- Row 1: 5 squares -->
  <rect x="5" y="5" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="25" y="5" width="17" height="17" rx="2" fill="#b59f3b"/>
  <rect x="45" y="5" width="17" height="17" rx="2" fill="#3a3a3c"/>
  <rect x="65" y="5" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="85" y="5" width="10" height="17" rx="2" fill="#3a3a3c"/>
  <!-- Row 2 -->
  <rect x="5" y="25" width="17" height="17" rx="2" fill="#b59f3b"/>
  <rect x="25" y="25" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="45" y="25" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="65" y="25" width="17" height="17" rx="2" fill="#b59f3b"/>
  <rect x="85" y="25" width="10" height="17" rx="2" fill="#3a3a3c"/>
  <!-- Row 3 -->
  <rect x="5" y="45" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="25" y="45" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="45" y="45" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="65" y="45" width="17" height="17" rx="2" fill="#538d4e"/>
  <rect x="85" y="45" width="10" height="17" rx="2" fill="#538d4e"/>
  <!-- Word "WORDLE" below -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#000" letter-spacing="1">WORDLE</text>
